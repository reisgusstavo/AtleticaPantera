<section class="hero">

    </div>

<div class="produtos">

  <div class="produto">
  <img src="img/caneca.png">
  <h3>Caneca Pantera</h3>
  <p>R$ 50,00</p>
  <button onclick="adicionarCarrinho('Caneca Pantera', 50, 'img/caneca.png')">

  </button>
</div>

<div class="produto">
  <img src="img/camiseta.png">
  <h3>Camiseta Atlética</h3>
  <p>R$ 50,00</p>
  <button onclick="adicionarCarrinho('Camiseta Atlética', 50, 'img/camiseta.png')">
    Adicionar ao carrinho
  </button>
</div>

<div class="produto">

  <h3>Jersey Pantera</h3>

<div class="produto">

  </button>
</div>

</div>


<script src="js/carrinho.js"></script>
<script>
function adicionarCarrinho(nome, preco, imagem){
    let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

    carrinho.push({
        nome: nome,
        preco: preco,
        imagem: imagem
    });

    localStorage.setItem("carrinho", JSON.stringify(carrinho));

    alert("Produto adicionado ao carrinho!");
}
</script>
