<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Carrinho</title>
<link rel="stylesheet" href="css/carrinho.css">
</head>

<body>
<main>

<h1>SEU CARRINHO</h1>

<div class="carrinho-container">

<ul id="listaCarrinho"></ul>

<h2 id="total"></h2>

<div class="botoes">

<a href="produtos.html">
<button class="voltar">Continuar Comprando</button>
</a>

<button class="limpar" onclick="limparCarrinho()">Limpar Carrinho</button>

<button class="finalizar" onclick="FinalizarPedido()">Finalizar Pedido</button>

</div>

</div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || []

let lista = document.getElementById("listaCarrinho")
let total = 0

carrinho.forEach(item => {

let li = document.createElement("li")

li.innerHTML = `
  <div class="item-carrinho">
    <img src="${item.imagem}">
    <span>${item.nome}</span>
  </div>
  <span>R$ ${item.preco.toFixed(2)}</span>
`

lista.appendChild(li)

total += item.preco

})

document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2)

function limparCarrinho(){
localStorage.removeItem("carrinho")
location.reload()
}

function FinalizarPedido() {

let mensagem = "Olá, quero comprar:%0A"

carrinho.forEach(item => {
mensagem += item.nome + " - R$ " + item.preco.toFixed(2) + "%0A"
})

mensagem += "%0ATotal: R$ " + total.toFixed(2)

window.open("https://wa.me/5545998118695?text=" + mensagem, "_blank")

}

</script>

</main>
<footer>
  <p>© 2026 Atlética Pantera Negra</p>
  <p class="creditos">
    Desenvolvido por <a href="https://instagram.com/seuinsta" target="_blank">@reis.gusstavo</a>
  </p>
</footer>

</body>
</html>
