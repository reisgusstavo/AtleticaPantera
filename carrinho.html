<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Carrinho</title>
<link rel="stylesheet" href="carrinho.css">
</head>

<body>

<h1>SEU CARRINHO</h1>

<div class="carrinho-container">

<ul id="listaCarrinho"></ul>

<h2 id="total"></h2>

<div class="botoes">

<a href="produtos.html">
<button class="voltar">Continuar Comprando</button>
</a>

<button class="limpar" onclick="limparCarrinho()">Limpar Carrinho</button>

<button class="finalizar" onclick="FinalizarPedido()">Finalizar Pedido</button>

</div>

</div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || []

let lista = document.getElementById("listaCarrinho")
let total = 0

carrinho.forEach(item => {

let li = document.createElement("li")
li.innerText = item.produto + " - R$ " + item.preco

lista.appendChild(li)

total += item.preco

})

document.getElementById("total").innerText = "Total: R$ " + total

function limparCarrinho(){
localStorage.removeItem("carrinho")
location.reload()
}

function FinalizarPedido() {

let mensagem = "Olá, quero comprar:%0A"

carrinho.forEach(item => {
mensagem += item.produto + " - R$ " + item.preco + "%0A"
})

mensagem += "%0ATotal: R$ " + total

window.open("https://wa.me/5545998118695?text=" + mensagem, "_blank")

}


</script>

</body>
</html>
